version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: pinger
    main: ./cmd/pinger
    binary: pinger
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: pinger
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

checksum:
  name_template: sha256sums.txt
  algorithm: sha256

release:
  github:
    owner: richardcase
    name: pinger
