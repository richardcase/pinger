name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Test
        run: |
          go test ./...
          go test -cover -coverprofile=coverage.out -covermode=atomic ./internal/...
          go tool cover -func=coverage.out | awk '/total/ { pct = $3+0; if (pct < 80) { print "Coverage " pct "% is below 80% threshold"; exit 1 } }'

      - name: Benchmark
        run: go test -bench=. -benchmem ./...
